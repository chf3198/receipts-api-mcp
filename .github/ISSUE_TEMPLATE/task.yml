name: Task / Feature Request
description: Propose a new feature or internal improvement
labels: ["type:task", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the task or feature you'd like to see added.

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should be built or changed, and why?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done?
      placeholder: |
        - [ ] AC1: ...
        - [ ] AC2: ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or related issues.
